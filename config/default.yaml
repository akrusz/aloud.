audio:
  input_device: default
  sample_rate: 16000
  channels: 1
  chunk_size: 480  # 30ms at 16kHz
  vad_sensitivity: 2  # 0-3, higher = more sensitive

stt:
  engine: whisper
  model: small  # tiny, base, small, medium, large
  language: en
  device: auto  # auto, cpu, cuda, mps

tts:
  # Engine options:
  #   macos   -- macOS native 'say' command (macOS only)
  #   piper   -- Piper neural TTS (pip install piper-tts)
  #   browser -- no server-side audio; falls back to browser speechSynthesis
  engine: macos
  voice: "Zoe (Premium)"
  rate: 120  # words per minute

  # ElevenLabs options (if engine: elevenlabs)
  # api_key: ${ELEVENLABS_API_KEY}
  # voice_id: 21m00Tcm4TlvDq8ikWAM  # Rachel - calm, warm
  # model_id: eleven_v3
  # stability: 0.75
  # similarity_boost: 0.75

llm:
  provider: ollama  # ollama, claude_proxy, anthropic, openai, groq, openrouter, venice
  model: sonnet

  # API key — uses env var substitution so keys stay out of the file.
  # Set the matching env var for your provider:
  #   anthropic:   ANTHROPIC_API_KEY
  #   openai:      OPENAI_API_KEY
  #   groq:        GROQ_API_KEY  (has a free tier)
  #   openrouter:  OPENROUTER_API_KEY
  #   venice:      VENICE_API_KEY
  #   claude_proxy: shells out to the local `claude` CLI; no key needed
  api_key:

  # For Ollama
  ollama_url: http://localhost:11434
  ollama_model: qwen3.5:4b

  # Recommended Ollama model tiers are defined in src/config.py (DEFAULT_OLLAMA_TIERS).
  # To override them per-deployment, uncomment and customize an `ollama_tiers:` block here.

  context:
    strategy: full  # full, rolling
    window_size: 100   # exchanges to keep (if rolling)
    max_tokens: 400    # max response tokens

pacing:
  response_delay_ms: 2000       # wait after speech ends before responding
  min_speech_duration_ms: 500   # ignore very short sounds
  silence_checkin_sec: 300        # when to offer a gentle check-in
  silence_checkins_enabled: true  # send gentle check-ins after extended silence
  silence_mode_enabled: true      # honor [HOLD] requests for held silence

facilitation:
  directiveness: 3          # 0-10 scale
  focuses: []               # body_sensations, emotions, inner_parts
  qualities: []             # playful, compassionate, loving, spacious, effortless, feeling_good
  verbosity: medium         # low, medium, high
  custom_instructions: |
    Feel free to suggest releasing the need to pay attention to anything specific.
    Trust the meditator's process.

session:
  auto_save: true
  save_directory: sessions
  include_timestamps: true
