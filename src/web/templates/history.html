{% extends "base.html" %}

{% block title %}History - glooow{% endblock %}

{% block nav_center %}
<div class="nav-session-info">
    <div class="orb orb-idle orb-nav"></div>
</div>
{% endblock %}

{% block content %}
<div class="history-container">
    <div class="history-header">
        <h1>Past Sessions</h1>
        <button class="btn-config-path" id="btn-open-sessions-folder">Open sessions folder</button>
    </div>

    <div class="session-list" id="session-list"></div>

    <div class="empty-state" id="empty-state" style="display: none;">
        <p>No sessions yet.</p>
        <a href="/" class="btn btn-primary">Start Your First Session</a>
    </div>

    <div style="text-align: center; padding: 1.5rem 0;">
        <button class="btn btn-secondary" id="load-more" style="display: none;">Load More</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
