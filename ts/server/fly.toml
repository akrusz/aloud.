# Fly.io deploy for the aloud hosted server (@aloud/server). meditation-pal-a3u.
#
# Deploy from the ts/ workspace root (so the Docker build context includes
# ../src = @aloud/core):
#
#   cd ts
#   fly launch --no-deploy --copy-config --name aloud-server   # first time only
#   fly volumes create aloud_data --size 1                     # durable ledger disk
#   fly secrets set ALOUD_SESSION_SECRET=... GOOGLE_CLIENT_IDS=... \
#                   ANTHROPIC_API_KEY=... GEMINI_API_KEY=... \
#                   FIREWORKS_API_KEY=... GOOGLE_TTS_API_KEY=... \
#                   ALOUD_CORS_ORIGINS=https://your-ui-host
#   fly deploy --config server/fly.toml
#
# Full runbook + the secret list: dev-docs/deploy.md.
#
# SINGLE-MACHINE BY DESIGN: the credit ledger is a SQLite file on the attached
# volume, so this app runs ONE machine (a volume binds to one machine). That's
# correct at trial scale. Scaling out later = swap SqliteCreditsStore for
# Postgres (credits/store.ts) and drop the [mounts].

app = "aloud-server"           # rename to your Fly app name
primary_region = "sjc"         # pick the region nearest your users

[build]
  dockerfile = "server/Dockerfile"

[env]
  ALOUD_ENV = "production"
  PORT = "8787"
  ALOUD_DB_PATH = "/data/aloud.db"

[http_service]
  internal_port = 8787
  force_https = true           # mic needs a secure context; Fly terminates TLS
  # Cost control at trial scale: suspend when idle, wake on the next request.
  # Safe with SQLite — the ledger lives on the volume and survives suspend.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Persistent disk for the SQLite credit ledger (ALOUD_DB_PATH above).
[mounts]
  source = "aloud_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
