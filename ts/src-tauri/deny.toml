# cargo-deny configuration. Run locally with `cargo deny check` (after
# `cargo install cargo-deny`); CI runs it in .github/workflows/security.yml.
#
# The CI gate currently runs `check advisories bans sources` — security first.
# The [licenses] policy below is configured but not yet enforced in CI; flip
# the CI command to `check` (all) once the allow-list has been reconciled
# against the full native dependency tree.

[advisories]
# Fail on any crate with a known security advisory or that's been yanked.
yanked = "deny"
# Add RUSTSEC IDs here (with a comment + expiry plan) to temporarily accept a
# specific advisory that has no fix yet.
ignore = []

[bans]
# Warn (don't fail) on duplicate versions of a crate — the Tauri + ort trees
# pull a lot of transitive deps, so duplicates are expected; this just surfaces
# them for periodic cleanup.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io and known git sources — block a dependency sneaking in from an
# unknown registry or fork.
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
# Generous permissive allow-list; expand as the tree requires. Not enforced in
# CI yet (see header note).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8
