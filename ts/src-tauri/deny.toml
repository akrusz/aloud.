# cargo-deny configuration. Run locally with `cargo deny check` (after
# `cargo install cargo-deny`); CI runs it in .github/workflows/security.yml.
#
# CI runs `check` (all of advisories + bans + sources + licenses). The
# allow-list below has been reconciled against the actual dependency tree —
# the only non-permissive-MIT/Apache outlier today is `Unlicense` (public
# domain dedication used by whisper-rs).

[advisories]
# Fail on any crate with a known security advisory or that's been yanked.
yanked = "deny"
# Add RUSTSEC IDs here (with a comment + expiry plan) to temporarily accept a
# specific advisory that has no fix yet.
ignore = [
    # All entries here are "unmaintained" findings, not security
    # vulnerabilities — informational notices that an upstream crate is no
    # longer being maintained. Real CVEs and yanked crates still fail the gate.
    # Re-check this list on every Tauri bump (it's almost all Tauri transitives).
    #
    # gtk-rs GTK3 bindings — Tauri (muda/tao/gtk) still depends on these
    # transitively on Linux; no safe upgrade until Tauri moves to gtk4-rs.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # unic-* Unicode crates — also Tauri transitives, project is archived.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    # proc-macro-error — maintainer unreachable; transitive build dep.
    "RUSTSEC-2024-0370",
]

[bans]
# Warn (don't fail) on duplicate versions of a crate — the Tauri + ort trees
# pull a lot of transitive deps, so duplicates are expected; this just surfaces
# them for periodic cleanup.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io and known git sources — block a dependency sneaking in from an
# unknown registry or fork.
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
# Reconciled against the actual tree; expand when a new dep brings in a new
# license. Add a comment naming the offending crate so the next reviewer
# knows which dep justifies the entry.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    # whisper-rs / whisper-rs-sys — public-domain dedication.
    "Unlicense",
    # webpki-roots / webpki-root-certs.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Our own crate is AGPL-3.0; skip workspace crates in the license check rather
# than allow AGPL globally (we don't want to silently pull an AGPL dep in).
private = { ignore = true }
