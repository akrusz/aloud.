<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>aloud.</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Knewave&display=block"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/src/style.css" />
    </head>
    <body>
        <!-- In the Tauri desktop shell the nav doubles as the window title bar.
             Dragging is wired in JS (tauri-chrome.ts) with a movement threshold
             so the whole bar — including over links/logo — drags the window
             while plain clicks still pass through. -->
        <nav class="nav">
            <div class="nav-start">
                <a href="#" class="nav-brand" id="aboutLink" title="About aloud.">aloud.</a>
            </div>
            <!-- nav-center is populated by the session view (orb + hamburger).
                 Idle pages leave it empty. -->
            <div class="nav-center" id="navCenter"></div>
            <div class="nav-links" id="navLinks">
                <a href="#" data-nav="setup" class="nav-active"><span class="nav-word-new">New </span>Session</a>
                <a href="#" data-nav="history">History</a>
                <a href="#" data-nav="settings">Settings</a>
                <button type="button" class="theme-toggle"
                    data-theme-toggle aria-label="Toggle theme"></button>
            </div>
        </nav>

        <main class="main">
            <div id="app-root">
                <!-- Setup, session, and history views mount here. -->
            </div>
        </main>

        <!-- Mobile bottom-nav — shown ≤767px (the imported CSS hides the top
             nav-links there). Links route through the SPA router via data-nav;
             the active class is synced in app.ts:setActiveNav. The bottom-nav
             is hidden during an active session (body[data-session-active]);
             mid-session mobile controls are a follow-up (floating hamburger). -->
        <nav class="bottom-nav" aria-label="Primary">
            <a href="#" data-nav="setup" class="bottom-nav-link">
                <svg class="bottom-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
                <span class="bottom-nav-label">Session</span>
            </a>
            <a href="#" data-nav="history" class="bottom-nav-link">
                <svg class="bottom-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/><polyline points="12 7 12 12 15 14"/></svg>
                <span class="bottom-nav-label">History</span>
            </a>
            <a href="#" data-nav="settings" class="bottom-nav-link">
                <svg class="bottom-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
                <span class="bottom-nav-label">Settings</span>
            </a>
            <button type="button" class="bottom-nav-link" id="bottomNavMore" aria-haspopup="true" aria-controls="mobileMoreSheet" data-mobile-more-open>
                <svg class="bottom-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
                <span class="bottom-nav-label">More</span>
            </button>
        </nav>

        <!-- Mobile "More" sheet — utility actions for phones. Fullscreen /
             window-close / update are intentionally omitted (Tauri-native or
             not applicable). Session-only End/History land with the in-session
             hamburger follow-up. -->
        <div class="mobile-more-sheet hidden" id="mobileMoreSheet" role="dialog" aria-label="More options" aria-modal="true">
            <div class="mobile-more-backdrop" data-mobile-more-close></div>
            <div class="mobile-more-panel">
                <button type="button" class="mobile-more-action mobile-more-end" id="moreEnd" data-session-only>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                    <span>End session</span>
                </button>
                <button type="button" class="mobile-more-action" id="moreHistory" data-session-only>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 10 9 10"/><polyline points="12 7 12 12 15 14"/></svg>
                    <span>History</span>
                </button>
                <div class="mobile-more-divider" data-session-only></div>
                <button type="button" class="mobile-more-action" id="moreAbout">
                    <span class="mobile-more-glyph">aloud.</span>
                    <span>About</span>
                </button>
                <button type="button" class="mobile-more-action" id="moreTheme">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <span>Toggle theme</span>
                </button>
                <button type="button" class="mobile-more-cancel" data-mobile-more-close>Cancel</button>
            </div>
        </div>

        <!-- About modal — lifted from base.html. Update checker omitted
             (desktop-app-specific; tracked in meditation-pal-cfy). -->
        <div class="about-modal-overlay hidden" id="aboutModal">
            <div class="about-modal">
                <div class="about-modal-header">
                    <span class="about-modal-title">About</span>
                    <button class="voice-modal-close" id="aboutClose">&times;</button>
                </div>
                <div class="about-modal-body">
                    <div class="about-app-name"><a href="https://aloud.rest" target="_blank" rel="noopener">aloud.</a></div>
                    <div class="about-version" id="aboutVersion"></div>
                    <div class="about-author">By Alex Krusz</div>
                    <div class="about-links">
                        <a href="https://krusz.net" target="_blank" rel="noopener">krusz.net</a>
                        <a href="https://github.com/akrusz" target="_blank" rel="noopener">GitHub</a>
                    </div>
                    <div class="about-donate-label">donate</div>
                    <div class="about-links about-donate">
                        <a href="https://ko-fi.com/alexkrusz" target="_blank" rel="noopener">ko-fi</a>
                        <a href="https://venmo.com/Alex-Krusz" target="_blank" rel="noopener">venmo</a>
                        <span class="about-eth" title="Click to copy">krusz.eth</span>
                        <a href="mailto:lexkrusz@gmail.com?subject=aloud">kind words</a>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
