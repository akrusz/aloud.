name: Build Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          brew install portaudio create-dmg
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pyinstaller

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          # Create a temp keychain just for this build, import the .p12,
          # and unlock it so codesign can use the private key non-interactively.
          KEYCHAIN=build.keychain
          echo "$MACOS_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PWD" "$KEYCHAIN"
          # Make the build keychain the default + first in search list so
          # codesign finds the identity and notarytool finds its profile.
          security default-keychain -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f cert.p12

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build app and DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARYTOOL_PROFILE: notary
        run: scripts/build-dmg.sh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aloud-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pyinstaller

      - name: Build
        run: pyinstaller aloud.spec --noconfirm

      - name: Get version
        id: version
        run: |
          $ver = python -c "import re; print(re.search(r'__version__\s*=\s*\x22(.+?)\x22', open('src/__init__.py').read()).group(1))"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create installer
        run: |
          $version = "${{ steps.version.outputs.version }}"
          @"
          [Setup]
          AppName=aloud
          AppVersion=$version
          AppPublisher=aloud
          DefaultDirName={autopf}\aloud
          DefaultGroupName=aloud
          OutputDir=dist
          OutputBaseFilename=aloud-$version-Windows
          Compression=lzma2
          SolidCompression=yes
          SetupIconFile=assets\aloud.ico
          UninstallDisplayIcon={app}\aloud.exe

          [Files]
          Source: "dist\aloud\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\aloud"; Filename: "{app}\aloud.exe"
          Name: "{autodesktop}\aloud"; Filename: "{app}\aloud.exe"

          [Run]
          Filename: "{app}\aloud.exe"; Description: "Launch aloud"; Flags: postinstall nowait
          "@ | Out-File -Encoding UTF8 aloud-installer.iss
          iscc aloud-installer.iss

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aloud-*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev \
            fuse libfuse2

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pyinstaller

      - name: Build
        run: pyinstaller aloud.spec --noconfirm

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('src/__init__.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package AppImage
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Get appimagetool
          wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Build AppDir
          mkdir -p aloud.AppDir/usr/bin
          cp -r dist/aloud/* aloud.AppDir/usr/bin/
          cp assets/aloud.png aloud.AppDir/aloud.png

          cat > aloud.AppDir/aloud.desktop << 'EOF'
          [Desktop Entry]
          Name=aloud
          Exec=aloud
          Icon=aloud
          Type=Application
          Categories=Utility;
          EOF

          cat > aloud.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/aloud" "$@"
          APPRUN
          chmod +x aloud.AppDir/AppRun

          ARCH=x86_64 ./appimagetool aloud.AppDir "dist/aloud-${VERSION}-Linux.AppImage"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aloud-*.AppImage
