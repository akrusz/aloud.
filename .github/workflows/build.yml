name: Build Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          brew install portaudio create-dmg
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pyinstaller

      - name: Build app and DMG
        run: scripts/build-dmg.sh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Glooow-*.dmg
          append_body: true
          body: |

            ---
            **macOS note:** If macOS blocks the app on first launch, right-click (or Control-click) Glooow.app and choose **Open**.

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pyinstaller

      - name: Generate icon
        run: |
          pip install Pillow
          python -c "
          from PIL import Image
          import struct, io
          # Convert favicon SVG fallback: create a simple icon from the PNG if available,
          # otherwise create a placeholder .ico
          img = Image.new('RGBA', (256, 256), (212, 135, 58, 255))
          img.save('assets/glooow.ico', format='ICO', sizes=[(256, 256), (128, 128), (64, 64), (48, 48), (32, 32), (16, 16)])
          "

      - name: Build
        run: pyinstaller glooow.spec --noconfirm

      - name: Get version
        id: version
        run: |
          $ver = python -c "import re; print(re.search(r'__version__\s*=\s*\x22(.+?)\x22', open('src/__init__.py').read()).group(1))"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create installer
        run: |
          $version = "${{ steps.version.outputs.version }}"
          @"
          [Setup]
          AppName=Glooow
          AppVersion=$version
          AppPublisher=Glooow
          DefaultDirName={autopf}\Glooow
          DefaultGroupName=Glooow
          OutputDir=dist
          OutputBaseFilename=Glooow-$version
          Compression=lzma2
          SolidCompression=yes
          SetupIconFile=assets\glooow.ico
          UninstallDisplayIcon={app}\Glooow.exe

          [Files]
          Source: "dist\Glooow\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\Glooow"; Filename: "{app}\Glooow.exe"
          Name: "{autodesktop}\Glooow"; Filename: "{app}\Glooow.exe"

          [Run]
          Filename: "{app}\Glooow.exe"; Description: "Launch Glooow"; Flags: postinstall nowait
          "@ | Out-File -Encoding UTF8 glooow-installer.iss
          iscc glooow-installer.iss

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Glooow-*.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            portaudio19-dev \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
            libgirepository1.0-dev \
            fuse libfuse2

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
          uv pip install --system pyinstaller

      - name: Build
        run: pyinstaller glooow.spec --noconfirm

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('src/__init__.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate icon
        run: |
          pip install Pillow
          python3 -c "
          from PIL import Image
          img = Image.new('RGBA', (256, 256), (212, 135, 58, 255))
          img.save('assets/glooow.png')
          "

      - name: Package AppImage
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Get appimagetool
          wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Build AppDir
          mkdir -p Glooow.AppDir/usr/bin
          cp -r dist/Glooow/* Glooow.AppDir/usr/bin/
          cp assets/glooow.png Glooow.AppDir/glooow.png

          cat > Glooow.AppDir/glooow.desktop << 'EOF'
          [Desktop Entry]
          Name=Glooow
          Exec=Glooow
          Icon=glooow
          Type=Application
          Categories=Utility;
          EOF

          cat > Glooow.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Glooow" "$@"
          APPRUN
          chmod +x Glooow.AppDir/AppRun

          ARCH=x86_64 ./appimagetool Glooow.AppDir "dist/Glooow-${VERSION}.AppImage"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Glooow-*.AppImage
