<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="orb" cx="45%" cy="45%" r="78%">
      <stop offset="0" stop-color="#fff4c0"/>
      <stop offset="0.18" stop-color="#f8f288"/>
      <stop offset="0.38" stop-color="#f5d820"/>
      <stop offset="0.49" stop-color="#ffb805"/>
      <stop offset="0.65" stop-color="#ed7326"/>
      <stop offset="0.71" stop-color="#e71f75"/>
      <stop offset="0.76" stop-color="#870a3e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0.5" stop-color="#e71f75" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#870a3e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed opaque square: iOS masks the corners and rejects alpha.
       Orb kept centered with margin so the corner mask never clips it. -->
  <rect x="0" y="0" width="1024" height="1024" fill="#110d08"/>
  <circle cx="512" cy="512" r="460" fill="url(#glow)"/>
  <circle cx="512" cy="512" r="360" fill="url(#orb)"/>
</svg>
