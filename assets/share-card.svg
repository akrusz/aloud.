<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Orb gradient: same stops as the app/site orb; r=78% mimics the CSS
         farthest-corner sizing so deep magenta sits at the bottom-right rim. -->
    <radialGradient id="orb" cx="45%" cy="45%" r="78%">
      <stop offset="0" stop-color="#fff4c0"/>
      <stop offset="0.18" stop-color="#f8f288"/>
      <stop offset="0.38" stop-color="#f5d820"/>
      <stop offset="0.49" stop-color="#ffb805"/>
      <stop offset="0.65" stop-color="#ed7326"/>
      <stop offset="0.71" stop-color="#e71f75"/>
      <stop offset="0.76" stop-color="#870a3e"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
  </defs>

  <!-- dark brand background -->
  <rect width="1200" height="630" fill="#110d08"/>

  <!-- soft pink halo behind the orb -->
  <circle cx="600" cy="248" r="188" fill="#e71f75" opacity="0.45" filter="url(#glow)"/>

  <!-- orb -->
  <circle cx="600" cy="248" r="176" fill="url(#orb)"/>

  <!-- wordmark over the orb: black outline (back) + yellow stroke + pink fill (front) -->
  <g font-family="Knewave" font-size="150" text-anchor="middle" letter-spacing="4">
    <text x="600" y="300" fill="#000000" stroke="#000000" stroke-width="24"
          stroke-linejoin="round" paint-order="stroke">aloud.</text>
    <text x="600" y="300" fill="#e71f75" stroke="#ffd820" stroke-width="14"
          stroke-linejoin="round" paint-order="stroke">aloud.</text>
  </g>

  <!-- tagline + url -->
  <text x="600" y="488" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="44" fill="#f5e8e6">a voice-based meditation facilitator</text>
  <text x="600" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="40" fill="#d4b880" letter-spacing="1">aloud.rest</text>
</svg>
