<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="orb" cx="45%" cy="45%" r="78%">
      <stop offset="0" stop-color="#fff4c0"/>
      <stop offset="0.18" stop-color="#f8f288"/>
      <stop offset="0.38" stop-color="#f5d820"/>
      <stop offset="0.49" stop-color="#ffb805"/>
      <stop offset="0.65" stop-color="#ed7326"/>
      <stop offset="0.71" stop-color="#e71f75"/>
      <stop offset="0.76" stop-color="#870a3e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0.5" stop-color="#e71f75" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#870a3e" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- macOS-style rounded-rect tile, inset with a soft drop shadow so it sits
       like a native Mac icon. (iOS uses the full-bleed square variant instead.) -->
  <rect x="100" y="116" width="824" height="824" rx="184" fill="#000000" opacity="0.35" filter="url(#shadow)"/>
  <rect x="100" y="100" width="824" height="824" rx="184" fill="#110d08"/>

  <!-- orb + halo, sized to stay within the tile -->
  <circle cx="512" cy="512" r="400" fill="url(#glow)"/>
  <circle cx="512" cy="512" r="300" fill="url(#orb)"/>
</svg>
